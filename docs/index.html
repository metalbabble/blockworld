<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BlockWorld</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; }
    canvas { display: block; }

    #hud {
      position: fixed;
      inset: 0;
      pointer-events: none;
      color: #fff;
      font-family: monospace;
      text-shadow: 1px 1px 2px #000;
    }

    /* Crosshair */
    #crosshair {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 20px; height: 20px;
    }
    #crosshair::before, #crosshair::after {
      content: '';
      position: absolute;
      background: rgba(255,255,255,0.85);
    }
    #crosshair::before { width: 2px; height: 100%; left: 50%; transform: translateX(-50%); }
    #crosshair::after  { width: 100%; height: 2px; top: 50%;  transform: translateY(-50%); }

    /* Block-in-hand display */
    #held-block {
      position: absolute;
      bottom: 24px; right: 24px;
      background: rgba(0,0,0,0.55);
      border: 2px solid rgba(255,255,255,0.3);
      border-radius: 6px;
      padding: 8px 14px;
      font-size: 13px;
      letter-spacing: 0.5px;
    }
    #held-block span { color: #aef; }

    /* Info overlay */
    #info {
      position: absolute;
      top: 10px; left: 10px;
      font-size: 12px;
      line-height: 1.6;
      opacity: 0.8;
    }

    /* Command bar */
    #command-bar {
      display: none;
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: rgba(0,0,0,0.75);
      padding: 10px 16px;
      font-family: monospace;
      font-size: 15px;
      color: #fff;
      z-index: 20;
    }
    #command-prompt {
      display: inline;
    }
    #command-prompt::after {
      content: '|';
      animation: blink 1s step-start infinite;
    }
    @keyframes blink {
      50% { opacity: 0; }
    }

    /* Command response message */
    #command-response {
      display: none;
      position: fixed;
      bottom: 48px; left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.7);
      color: #ffe;
      font-family: monospace;
      font-size: 14px;
      padding: 6px 16px;
      border-radius: 4px;
      pointer-events: none;
      z-index: 20;
    }

    /* Click-to-start overlay */
    #overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-family: monospace;
      cursor: pointer;
      z-index: 10;
    }
    #overlay h1 { font-size: 2.5rem; margin-bottom: 1rem; letter-spacing: 2px; }
    #overlay p  { font-size: 1rem; opacity: 0.7; margin: 0.2rem 0; }
    #overlay .hint { margin-top: 2rem; font-size: 0.85rem; opacity: 0.5; }
  </style>
  <script type="module" crossorigin src="/blockworld/assets/index-D4kRl4Ch.js"></script>
</head>
<body>
  <div id="overlay">
    <h1>BLOCKWORLD</h1>
    <p style="margin-top:-0.5rem; margin-bottom:0.5rem; font-size:0.85rem; opacity:0.6;">metalbabble.com</p>
    <p>W/A/S/D — Move &nbsp;|&nbsp; Space — Jump</p>
    <p>Left Click — Pick up block &nbsp;|&nbsp; Right Click — Place block</p>
    <p class="hint">Click to start</p>
    <p id="version-display" style="margin-top:0.5rem; font-size:0.75rem; opacity:0.35;"></p>
  </div>

  <div id="hud">
    <div id="crosshair"></div>
    <div id="held-block">Holding: <span id="held-name">nothing</span></div>
    <div id="info">
      <div id="world-seed"></div>
      <div id="pos-display"></div>
      <div id="chunk-display"></div>
    </div>
  </div>

  <div id="command-bar"><span id="command-prompt">&gt; </span></div>
  <div id="command-response"></div>

</body>
</html>
