<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="BlockWorld">
  <link rel="apple-touch-icon" href="icon.png">
  <link rel="icon" href="icon.png">
  <title>BlockWorld</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; }
    canvas { display: block; touch-action: none; }

    #hud {
      position: fixed;
      inset: 0;
      pointer-events: none;
      color: #fff;
      font-family: monospace;
      text-shadow: 1px 1px 2px #000;
    }

    /* Hide crosshair while overlay is visible */
    #overlay:not([style*="display: none"]):not([style*="display:none"]) ~ #hud #crosshair {
      display: none;
    }

    /* Crosshair */
    #crosshair {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 20px; height: 20px;
    }
    #crosshair::before, #crosshair::after {
      content: '';
      position: absolute;
      background: rgba(255,255,255,0.85);
    }
    #crosshair::before { width: 2px; height: 100%; left: 50%; transform: translateX(-50%); }
    #crosshair::after  { width: 100%; height: 2px; top: 50%;  transform: translateY(-50%); }

    /* Inventory dock */
    #inventory-dock {
      display: none;
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      gap: 8px;
      padding: 8px 12px;
      background: rgba(0,0,0,0.5);
      border-radius: 16px;
      pointer-events: all;
      z-index: 12;
      user-select: none;
      -webkit-user-select: none;
    }
    .dock-item {
      position: relative;
      width: 56px;
      height: 56px;
      border-radius: 8px;
      border: 2px solid rgba(255,255,255,0.25);
      overflow: hidden;
      cursor: pointer;
      flex-shrink: 0;
    }
    .dock-item.dock-selected {
      border-color: #fff;
      box-shadow: 0 0 0 2px rgba(255,255,255,0.55);
    }
    .dock-badge {
      position: absolute;
      bottom: 3px;
      right: 5px;
      font-family: monospace;
      font-size: 11px;
      font-weight: bold;
      color: #fff;
      text-shadow: 1px 1px 2px #000, -1px 0 2px #000;
      pointer-events: none;
    }

    /* Info overlay */
    #info {
      display: none;
      position: absolute;
      top: 10px; left: 10px;
      font-size: 12px;
      line-height: 1.6;
      opacity: 0.8;
    }

    /* Command bar */
    #command-bar {
      display: none;
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: rgba(0,0,0,0.75);
      padding: 10px 16px;
      font-family: monospace;
      font-size: 15px;
      color: #fff;
      z-index: 20;
    }
    #command-prompt {
      display: inline;
    }
    #command-prompt::after {
      content: '|';
      animation: blink 1s step-start infinite;
    }
    @keyframes blink {
      50% { opacity: 0; }
    }

    /* Command response message */
    #command-response {
      display: none;
      position: fixed;
      bottom: 48px; left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.7);
      color: #ffe;
      font-family: monospace;
      font-size: 14px;
      padding: 6px 16px;
      border-radius: 4px;
      pointer-events: none;
      z-index: 20;
    }

    /* Click-to-start overlay */
    #overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4vh;
      color: #fff;
      font-family: monospace;
      cursor: pointer;
      z-index: 10;
      padding-bottom: 100px;
    }
    #overlay-title {
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    #overlay h1 { font-size: 2.5rem; margin-bottom: 0.3rem; letter-spacing: 2px; }
    #overlay-title img { height: 20rem; width: auto; margin-bottom: 0.3rem; }
    #overlay .site { font-size: 0.85rem; opacity: 0.6; margin: 0.15rem 0; }
    #version-display { font-size: 0.75rem; opacity: 0.35; margin: 0.1rem 0; }
    #overlay-motd { font-size: 0.85rem; opacity: 0.75; margin: 0; text-align: center; max-width: 36rem; line-height: 1.5; }
    #overlay-instructions {
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    #overlay-instructions-kb,
    #overlay-instructions-touch {
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    #overlay p  { font-size: 1rem; opacity: 0.7; margin: 0.2rem 0; }
    #overlay .hint {
      margin-top: 1.5rem;
      font-size: 0.85rem;
      animation: glow-pulse 2s ease-in-out infinite;
    }
    @keyframes glow-pulse {
      0%, 100% { opacity: 0.4; text-shadow: none; }
      50% { opacity: 1; text-shadow: 0 0 8px #fff, 0 0 18px rgba(255,255,255,0.6); }
    }

    /* ── Touch controls ───────────────────────────────────────────────────── */

    /* Bottom strip that holds D-pad + action buttons */
    #touch-controls {
      display: none;
      position: fixed;
      bottom: 0; left: 0; right: 0;
      padding: 12px 28px 24px;
      justify-content: space-between;
      align-items: flex-end;
      z-index: 15;
      pointer-events: none;   /* container is transparent; only buttons catch touches */
      user-select: none;
      -webkit-user-select: none;
    }

    /* D-pad column */
    .tc-dpad {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }
    /* Middle row of the D-pad (left + right) */
    .tc-dpad-row {
      display: flex;
      gap: 48px; /* space between ◀ and ▶ */
    }

    /* Action buttons column */
    .tc-actions {
      display: flex;
      flex-direction: column;
      gap: 8px;
      align-items: stretch;
    }

    /* Shared button style */
    .tc-btn {
      pointer-events: all;
      background: rgba(0, 0, 0, 0.55);
      border: 2px solid rgba(255, 255, 255, 0.38);
      border-radius: 12px;
      color: #fff;
      font-family: monospace;
      font-weight: bold;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
    }
    .tc-btn:active,
    .tc-btn.tc-pressed { background: rgba(255, 255, 255, 0.22); }
    .tc-btn:disabled   { opacity: 0.32; cursor: default; }

    /* D-pad buttons: large square */
    .tc-dpad .tc-btn {
      width: 72px;
      height: 72px;
      font-size: 22px;
    }

    /* Action buttons: wide rectangle */
    .tc-actions .tc-btn {
      width: 88px;
      height: 56px;
      font-size: 13px;
      letter-spacing: 1px;
    }

    /* Narrow portrait viewports: raise touch controls above the inventory dock */
    @media (max-width: 500px) {
      #touch-controls {
        bottom: 96px; /* clears the dock (56px icon + 16px padding + 20px offset + margin) */
      }
    }

    /* ☰ Menu button (top-left, touch mode only) */
    #touch-menu-btn {
      display: none;
      position: fixed;
      top: 12px; left: 12px;
      background: rgba(0, 0, 0, 0.55);
      border: 2px solid rgba(255, 255, 255, 0.38);
      border-radius: 8px;
      color: #fff;
      font-family: monospace;
      font-size: 14px;
      padding: 8px 16px;
      cursor: pointer;
      z-index: 15;
      pointer-events: all;
      -webkit-tap-highlight-color: transparent;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
    }
  </style>
</head>
<body>
  <div id="overlay">
    <div id="overlay-title">
      <img src="/blockworld-title.png" alt="BlockWorld"/>
      <p id="version-display"></p>
      <p class="site">metalbabble.com</p>
    </div>
    <p id="overlay-motd"></p>
    <div id="overlay-instructions">
      <!-- Keyboard / mouse instructions (default) -->
      <div id="overlay-instructions-kb">
        <p>W/A/S/D — Move &nbsp;|&nbsp; Space — Jump &nbsp;|&nbsp; Shift — Sprint</p>
        <p>Left Click — Pick up block &nbsp;|&nbsp; Right Click — Place block</p>
      </div>
      <!-- Touch instructions (shown after first tap) -->
      <div id="overlay-instructions-touch" style="display:none">
        <p>Left pad — Move &nbsp;|&nbsp; JUMP — Jump</p>
        <p>GRAB — Pick up block &nbsp;|&nbsp; PUT — Place block</p>
        <p>Drag on screen to look around</p>
      </div>
      <p class="hint" id="overlay-hint">Tap or click to continue...</p>
    </div>
  </div>

  <div id="hud">
    <div id="crosshair"></div>
    <div id="info">
      <div id="world-seed"></div>
      <div id="pos-display"></div>
      <div id="chunk-display"></div>
    </div>
  </div>

  <div id="command-bar"><span id="command-prompt">&gt; </span></div>
  <div id="command-response"></div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
